name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: cargo fmt --check
        working-directory: server
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: server
        run: cargo clippy --locked --all-targets -- -D warnings

  server:
    name: server (cargo test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pagetally_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/pagetally_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Build
        working-directory: server
        run: cargo build --locked
      - name: Test
        working-directory: server
        run: cargo test --locked
      - name: Verify server boots and migrations apply
        working-directory: server
        env:
          BIND_ADDR: 127.0.0.1:3001
        run: |
          cargo run --locked --bin pagetally-server &
          PID=$!
          for i in $(seq 1 30); do
            sleep 1
            curl -fsS http://127.0.0.1:3001/health && break
          done
          kill $PID

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          shared-key: audit
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        working-directory: server
        # RUSTSEC-2023-0071: rsa Marvin attack. Pulled in only via sqlx-mysql
        # at compile time (sqlx-macros). We enable only the postgres feature,
        # so rsa code is never linked into the runtime binary.
        run: cargo audit --ignore RUSTSEC-2023-0071

  client:
    name: client (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - working-directory: client
        run: npm ci
      - working-directory: client
        run: npm run typecheck
      - working-directory: client
        run: npm test
      - working-directory: client
        run: npm run build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pagetally_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/pagetally_e2e
      CI: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # run-server.sh builds the client (for /pt.js) then runs the server.
      - name: install client deps
        working-directory: client
        run: npm ci
      - name: install e2e deps
        working-directory: e2e
        run: npm ci
      - name: install playwright chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: run e2e
        working-directory: e2e
        run: npx playwright test
